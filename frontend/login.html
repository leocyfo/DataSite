<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — DB Explorer</title>
<link rel="stylesheet" href="style.css">
<script>
  if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
</script>
</head>
<body>

<div class="login-screen">
  <div class="login-card">
    <div class="login-logo"><span class="dot"></span> DB EXPLORER</div>
    <h2 id="loginTitle">Connexion</h2>
    <p class="login-subtitle" id="loginSubtitle">Entrez le mot de passe pour continuer.</p>

    <form id="formLogin">
      <label>Mot de passe
        <input type="password" id="inputPassword" required autofocus>
      </label>
      <label id="labelConfirmPassword" hidden>Confirmer le mot de passe
        <input type="password" id="inputPasswordConfirm">
      </label>
      <p class="form-error" id="errorLogin"></p>
      <button type="submit" class="btn-primary" id="btnSubmitLogin">Se connecter</button>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
